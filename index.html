<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4efe4">
<title>ロシア語マスター — Русский язык</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ロシア語マスター">
<meta name="description" content="日本語話者のためのロシア語学習PWA。初級・中級・上級コースをSRSで効率学習。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f4efe4;--bg-card:#fdfaf3;--bg-sub:#faf5ea;
    --ink:#1a1410;--ink-soft:#5a4f42;--ink-muted:#8b7e6d;--ink-faint:#b5a78f;
    --line:#e2d8c2;--line-soft:#ecdfc8;
    --accent:#a8391a;--accent-warm:#c86432;--accent-soft:rgba(168,57,26,0.08);
    --gold:#b8955a;--gold-soft:#d9c89a;--green:#5a7a3a;
    --shadow-sm:0 1px 2px rgba(26,20,16,0.04);
    --shadow-md:0 1px 2px rgba(26,20,16,0.03),0 4px 16px rgba(26,20,16,0.04);
    --shadow-lg:0 2px 4px rgba(26,20,16,0.04),0 12px 32px rgba(26,20,16,0.06);
  }
  html{background:var(--bg);}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;max-width:480px;margin:0 auto;
    background-image:radial-gradient(circle at 20% 10%,rgba(184,149,90,0.04) 0%,transparent 40%),
      radial-gradient(circle at 85% 70%,rgba(168,57,26,0.03) 0%,transparent 45%);
    pointer-events:none;z-index:0;
  }
  .app{position:relative;z-index:1;}

  .screen{display:none;animation:fadeIn .35s ease;min-height:100vh;padding-bottom:80px;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* TOP BAR */
  .top-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 12px;background:var(--bg);
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .top-bar .left{display:flex;align-items:center;gap:10px;}
  .back-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;cursor:pointer;color:var(--ink);border-radius:50%;
    transition:background .2s;
  }
  .back-btn:active{background:var(--accent-soft);}
  .back-btn svg{width:16px;height:16px;}
  .top-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;letter-spacing:.1em;}
  .top-title .ru{font-family:'PT Serif',serif;color:var(--accent);font-size:12.5px;margin-top:1px;display:block;letter-spacing:.05em;font-weight:500;}
  .top-meta{font-size:12.5px;color:var(--ink-muted);letter-spacing:.1em;}

  /* HOME */
  .home-header{padding:32px 24px 20px;text-align:center;}
  .home-header .mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px;}
  .home-header .mark span{display:block;width:20px;height:1px;background:var(--gold);}
  .home-header .mark .ru-mini{font-family:'PT Serif',serif;font-weight:500;font-size:12.5px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;}
  .home-header h1{font-family:'Shippori Mincho',serif;font-weight:600;font-size:28px;letter-spacing:.1em;margin-bottom:8px;}
  .home-header .ru-title{font-family:'PT Serif',serif;font-weight:400;font-size:17px;color:var(--accent);letter-spacing:.05em;margin-bottom:10px;}
  .home-header .subtitle{font-size:12px;color:var(--ink-muted);letter-spacing:.3em;text-transform:uppercase;}

  .stats-bar{
    margin:4px 16px 24px;padding:16px 20px;background:var(--bg-card);
    border:1px solid var(--line);border-radius:6px;
    display:flex;justify-content:space-around;box-shadow:var(--shadow-sm);
  }
  .stat-item{text-align:center;}
  .stat-num{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600;color:var(--accent);line-height:1;}
  .stat-label{font-size:12px;color:var(--ink-muted);letter-spacing:.15em;margin-top:6px;}

  /* DAILY — streak + today's goal */
  .daily-bar{
    margin:-8px 16px 24px;padding:16px 20px;background:var(--bg-card);
    border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;gap:20px;
  }
  .daily-streak{text-align:center;flex-shrink:0;padding-right:20px;border-right:1px solid var(--line-soft);}
  .streak-num{font-family:'Shippori Mincho',serif;font-size:26px;font-weight:600;color:var(--accent);line-height:1;}
  .streak-num .unit{font-size:13px;margin-left:2px;color:var(--ink-soft);font-weight:500;}
  .streak-label{font-size:11px;color:var(--ink-muted);letter-spacing:.15em;margin-top:6px;}
  .daily-goal{flex:1;min-width:0;}
  .goal-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .goal-label{font-size:12px;color:var(--ink-muted);letter-spacing:.12em;}
  .goal-count{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.05em;}
  .goal-track{height:5px;background:var(--line-soft);border-radius:3px;overflow:hidden;}
  .goal-fill{height:100%;width:0;background:var(--gold);border-radius:3px;transition:width .4s ease;}
  .goal-fill.done{background:var(--green);}
  .goal-msg{font-size:11.5px;color:var(--ink-muted);letter-spacing:.08em;margin-top:7px;min-height:14px;}
  .goal-msg.done{color:var(--green);}

  .section-title{
    padding:8px 24px 14px;font-family:'Shippori Mincho',serif;
    font-size:14px;font-weight:600;letter-spacing:.2em;color:var(--ink);
    display:flex;align-items:center;gap:12px;
  }
  .section-title::before{content:'';width:16px;height:1px;background:var(--accent);}

  /* COURSE CARDS */
  .courses{padding:0 16px;}
  .course-card{
    display:block;width:100%;background:var(--bg-card);border:1px solid var(--line);
    border-radius:8px;padding:22px 22px 20px;margin-bottom:14px;text-align:left;cursor:pointer;
    box-shadow:var(--shadow-md);position:relative;overflow:hidden;
    transition:transform .2s,box-shadow .2s;
  }
  .course-card:active{transform:scale(.99);}
  .course-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ribbon);
  }
  .course-card.script{--ribbon:linear-gradient(to right,#5a7a3a,#8aa860);}
  .course-card.beginner{--ribbon:linear-gradient(to right,#b8955a,#d9c89a);}
  .course-card.intermediate{--ribbon:linear-gradient(to right,#c86432,#e88e5a);}
  .course-card.advanced{--ribbon:linear-gradient(to right,#a8391a,#6b2010);}

  .course-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .course-level{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600;letter-spacing:.1em;}
  .course-ru{font-family:'PT Serif',serif;font-size:15px;color:var(--accent);margin-top:4px;font-weight:500;}
  .course-num{font-family:'Shippori Mincho',serif;font-size:12.5px;color:var(--gold);letter-spacing:.2em;}
  .course-desc{font-size:14px;color:var(--ink-soft);margin-bottom:16px;letter-spacing:.04em;}

  .progress-row{display:flex;align-items:center;gap:12px;}
  .progress-track{flex:1;height:4px;background:var(--line-soft);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  .progress-text{font-size:12.5px;color:var(--ink-soft);letter-spacing:.05em;font-variant-numeric:tabular-nums;min-width:56px;text-align:right;}

  /* UNIT LIST */
  .course-banner{padding:24px 24px 20px;text-align:center;border-bottom:1px solid var(--line);margin-bottom:8px;}
  .course-banner .label{font-size:12px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px;text-transform:uppercase;}
  .course-banner h2{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;letter-spacing:.12em;margin-bottom:6px;}
  .course-banner .ru{font-family:'PT Serif',serif;color:var(--accent);font-size:15px;margin-bottom:10px;}

  .units{padding:12px 16px;}
  .unit-card{
    display:flex;align-items:center;width:100%;background:var(--bg-card);
    border:1px solid var(--line);border-radius:6px;padding:16px 18px;margin-bottom:10px;
    cursor:pointer;text-align:left;box-shadow:var(--shadow-sm);
    transition:transform .15s,box-shadow .2s;
  }
  .unit-card:active{transform:scale(.99);}
  .unit-num{font-family:'Shippori Mincho',serif;font-size:15px;color:var(--gold);font-weight:500;letter-spacing:.12em;min-width:36px;}
  .unit-info{flex:1;}
  .unit-title{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;letter-spacing:.06em;margin-bottom:3px;}
  .unit-ru{font-family:'PT Serif',serif;font-size:13px;color:var(--accent);}
  .unit-meta{text-align:right;margin-left:12px;}
  .unit-count{font-size:12px;color:var(--ink-muted);letter-spacing:.1em;font-variant-numeric:tabular-nums;}
  .unit-progress{width:36px;height:3px;background:var(--line-soft);border-radius:2px;margin-top:6px;overflow:hidden;}
  .unit-progress-fill{height:100%;background:var(--accent);transition:width .3s;}
  .unit-progress-fill.complete{background:var(--green);}

  /* STUDY */
  .study-controls{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--line);
    position:sticky;top:49px;z-index:40;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .mode-tabs{display:flex;gap:0;background:var(--bg-sub);border-radius:4px;padding:2px;}
  .mode-tab{
    padding:6px 12px;font-size:12.5px;font-weight:500;letter-spacing:.1em;color:var(--ink-muted);
    background:transparent;border:none;cursor:pointer;border-radius:3px;transition:all .2s;
  }
  .mode-tab.active{background:var(--bg-card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .study-counter{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink-soft);font-variant-numeric:tabular-nums;letter-spacing:.1em;}

  /* Audio-trigger Cyrillic text is a real <button> (keyboard + screen-reader access).
     Strip native button chrome and inherit the surrounding text styling/alignment so the
     look is identical to the former <div>. Declared before the per-element rules below so
     those rules win on any property they set. */
  .sent-ru,.vocab-ru,.fc-ru,.quiz-ru{
    appearance:none;-webkit-appearance:none;
    border:none;background:transparent;color:inherit;
    font:inherit;text-align:inherit;cursor:pointer;width:auto;
  }

  /* SENTENCE LIST */
  .sentence-list{padding:14px 16px 24px;}
  .sentence-card{
    background:var(--bg-card);border:1px solid var(--line);border-radius:8px;
    padding:20px 18px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);position:relative;
    animation:fadeUp .3s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .sentence-card .num{position:absolute;top:14px;right:18px;font-family:'Shippori Mincho',serif;font-size:12px;color:var(--gold);letter-spacing:.15em;}

  .sent-ru{
    font-family:'Noto Sans',sans-serif;font-weight:600;font-size:24px;line-height:1.5;color:var(--ink);
    cursor:pointer;display:inline-block;padding:4px 8px;border-radius:6px;
    transition:background .2s,color .2s;user-select:none;-webkit-user-select:none;
    margin-bottom:8px;margin-left:-8px;
  }
  .sent-ru:active,.sent-ru.playing{background:var(--accent-soft);color:var(--accent);}
  .sent-ru .speaker-icon{display:inline-block;width:14px;height:14px;margin-left:8px;opacity:.4;vertical-align:middle;transition:opacity .2s;}
  .sent-ru.playing .speaker-icon{opacity:1;}

  .sent-ph{
    font-family:'Inter',sans-serif;font-size:15px;color:var(--ink-soft);
    letter-spacing:.02em;margin-bottom:8px;font-style:italic;
  }
  .sent-jp{
    font-family:'Shippori Mincho',serif;font-size:16px;font-weight:500;color:var(--ink);
    letter-spacing:.05em;padding-bottom:14px;border-bottom:1px dashed var(--line-soft);
  }

  .sent-actions{display:flex;gap:8px;margin-top:12px;align-items:center;}
  .icon-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    background:transparent;border:1px solid var(--line);border-radius:4px;cursor:pointer;
    color:var(--ink-soft);transition:all .15s;flex-shrink:0;
  }
  .icon-btn:active{transform:scale(.95);}
  .icon-btn svg{width:14px;height:14px;}
  .icon-btn.slow{color:var(--gold);}
  .icon-btn.learned{background:var(--bg-sub);}
  .icon-btn.learned.active{background:var(--green);color:#fff;border-color:var(--green);}

  .vocab-toggle{
    flex:1;text-align:left;padding:8px 12px;font-size:12.5px;font-weight:500;
    background:var(--bg-sub);border:1px solid var(--line);border-radius:4px;color:var(--ink-soft);
    cursor:pointer;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;
  }
  .vocab-toggle.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .vocab-toggle .arrow{font-size:12px;transition:transform .2s;}
  .vocab-toggle.active .arrow{transform:rotate(90deg);}

  .vocab-list{
    margin-top:12px;padding:14px 14px 4px;background:var(--bg-sub);border-radius:6px;
    display:none;animation:fadeIn .25s ease;
  }
  .vocab-list.show{display:block;}
  .vocab-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 4px;border-bottom:1px solid var(--line-soft);gap:12px;
  }
  .vocab-item:last-child{border-bottom:none;}
  .vocab-ru{
    font-family:'Noto Sans',sans-serif;font-weight:600;font-size:17px;color:var(--ink);
    cursor:pointer;padding:2px 4px;border-radius:3px;transition:background .2s;flex-shrink:0;
  }
  .vocab-ru:active,.vocab-ru.playing{background:var(--accent-soft);color:var(--accent);}
  .vocab-ph{font-family:'Inter',sans-serif;font-size:12.5px;color:var(--ink-muted);letter-spacing:.02em;flex:1;text-align:center;}
  .vocab-jp{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink);text-align:right;flex-shrink:0;max-width:120px;}

  /* CARD MODE */
  .card-area{padding:24px 20px;min-height:calc(100vh - 220px);display:flex;flex-direction:column;}
  .flashcard{
    flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:12px;
    padding:32px 22px;box-shadow:var(--shadow-lg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;position:relative;min-height:380px;
  }
  .fc-num{position:absolute;top:18px;left:22px;font-family:'Shippori Mincho',serif;font-size:12.5px;color:var(--gold);letter-spacing:.2em;}
  .fc-side{position:absolute;top:18px;right:22px;font-size:11px;color:var(--ink-faint);letter-spacing:.25em;text-transform:uppercase;}

  .fc-ru{
    font-family:'Noto Sans',sans-serif;font-weight:600;font-size:26px;line-height:1.5;color:var(--ink);
    margin-bottom:16px;cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .2s;
  }
  .fc-ru.playing{background:var(--accent-soft);color:var(--accent);}
  .fc-ph{font-family:'Inter',sans-serif;font-size:15px;color:var(--ink-soft);letter-spacing:.02em;margin-bottom:24px;font-style:italic;}
  .fc-jp{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:600;color:var(--accent);letter-spacing:.06em;line-height:1.5;transition:opacity .3s,filter .3s;}
  .fc-hint{margin-top:24px;font-size:12px;color:var(--ink-faint);letter-spacing:.25em;text-transform:uppercase;}
  .fc-hidden{opacity:.15;filter:blur(6px);user-select:none;}

  .fc-controls{display:flex;gap:12px;margin-top:20px;}
  .fc-btn{
    flex:1;padding:14px;font-family:'Shippori Mincho',serif;font-size:14px;font-weight:500;letter-spacing:.15em;
    background:var(--bg-card);border:1px solid var(--line);border-radius:6px;cursor:pointer;color:var(--ink);
    display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;
  }
  .fc-btn:active{transform:scale(.97);}
  .fc-btn svg{width:14px;height:14px;}
  .fc-btn.prev{color:var(--ink-soft);}
  .fc-btn.next{background:var(--ink);color:var(--bg-card);border-color:var(--ink);}

  /* QUIZ */
  .quiz-area{padding:20px 20px 40px;}
  .quiz-progress{display:flex;gap:4px;margin-bottom:24px;}
  .quiz-progress .pip{flex:1;height:3px;background:var(--line-soft);border-radius:2px;transition:background .3s;}
  .quiz-progress .pip.done{background:var(--green);}
  .quiz-progress .pip.wrong{background:var(--accent);}
  .quiz-progress .pip.current{background:var(--gold);}

  .quiz-question{
    text-align:center;margin-bottom:24px;padding:28px 18px;
    background:var(--bg-card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-md);
  }
  .quiz-prompt{font-size:12px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
  .quiz-ru{
    font-family:'Noto Sans',sans-serif;font-weight:600;font-size:22px;line-height:1.5;
    margin-bottom:8px;cursor:pointer;display:inline-block;padding:4px 10px;border-radius:4px;transition:background .2s;
  }
  .quiz-ru.playing{background:var(--accent-soft);color:var(--accent);}
  .quiz-ph-small{font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-muted);letter-spacing:.02em;margin-top:4px;font-style:italic;}
  .quiz-jp{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:600;color:var(--ink);letter-spacing:.06em;line-height:1.4;}

  .quiz-options{display:flex;flex-direction:column;gap:10px;}
  .quiz-option{
    background:var(--bg-card);border:1px solid var(--line);border-radius:6px;padding:14px 16px;
    cursor:pointer;text-align:left;transition:all .15s;position:relative;
  }
  .quiz-option:active{transform:scale(.99);}
  .quiz-option .opt-ru{font-family:'Noto Sans',sans-serif;font-weight:500;font-size:17px;color:var(--ink);margin-bottom:2px;line-height:1.4;}
  .quiz-option .opt-jp{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;}
  .quiz-option .opt-ph{font-family:'Inter',sans-serif;font-size:12.5px;color:var(--ink-muted);letter-spacing:.02em;margin-top:2px;font-style:italic;}
  .quiz-option.correct{background:rgba(90,122,58,0.08);border-color:var(--green);}
  .quiz-option.correct::after{content:'✓';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--green);font-size:19px;font-weight:bold;}
  .quiz-option.wrong{background:rgba(168,57,26,0.06);border-color:var(--accent);}
  .quiz-option.wrong::after{content:'×';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:22px;}
  .quiz-option.disabled{pointer-events:none;}

  .quiz-next-btn{
    margin-top:18px;width:100%;padding:14px;font-family:'Shippori Mincho',serif;
    font-size:14px;font-weight:500;letter-spacing:.2em;
    background:var(--ink);color:var(--bg-card);border:none;border-radius:6px;cursor:pointer;display:none;
  }
  .quiz-next-btn.show{display:block;animation:fadeIn .25s;}
  .quiz-next-btn:active{transform:scale(.99);}

  /* QUIZ — 形式選択メニュー */
  .quiz-menu{display:flex;flex-direction:column;gap:12px;padding-top:4px;}
  .quiz-menu-head{font-size:12px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:6px;}
  .quiz-menu-btn{

<script>
'use strict';
let COURSES = {};
const COURSES_URL = './courses.json';
const state = {course:null, unit:null, mode:'list', cardIdx:0, cardFlipped:false, quiz:null, reviewQueue:null, globalQueue:null};

// DOM shorthand
const $  = (id) => document.getElementById(id);
const $$ = (sel, root) => (root||document).querySelectorAll(sel);

// SVG icons (centralised so they don't drift)
const ICONS = {
  back:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>',
  forward: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
  clock:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  check:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  speaker: '<svg class="speaker-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>'
};

async function loadCourses(){
  const res = await fetch(COURSES_URL,{cache:'force-cache'});
  if(!res.ok) throw new Error('courses.json: '+res.status);
  COURSES = await res.json();
}

// STORAGE
const STORAGE_KEY = 'russian_master_v1_progress';
function loadProgress(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    const p=r?JSON.parse(r):{};
    if(!p.learned) p.learned={};
    if(!p.srs) p.srs={};
    if(!p.daily) p.daily={};
    return p;
  }catch{return{learned:{},srs:{},daily:{}};}
}
function saveProgress(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));}catch{}}
const progress = loadProgress();
function sentKey(c,u,i){return c+'/'+u+'/'+i;}

// 日別学習カウント(ストリーク・今日の目標用)。キーは端末ローカル日付 YYYY-MM-DD。
const DAILY_GOAL = 20;
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function bumpDaily(){
  const k=todayKey();
  progress.daily[k]=(progress.daily[k]||0)+1;
}

// EXPORT / IMPORT
function showDataMsg(text,isError){
  const el=$('data-msg');
  el.textContent=text;
  el.classList.toggle('error',!!isError);
  clearTimeout(showDataMsg._t);
  showDataMsg._t=setTimeout(()=>{el.textContent='';},6000);
}
function exportProgress(){
  const data={
    app:'russian-master',version:3,
    exportedAt:new Date().toISOString(),
    progress:{learned:progress.learned,srs:progress.srs,daily:progress.daily}
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='russian-master-progress-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showDataMsg('エクスポートしました(学習済 '+Object.keys(progress.learned).length+' 件)');
}
// mergeProgress(新しい記録優先の進捗マージ)は単体テストのため srs.js に切り出してある。
function importProgressFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      const p=data.progress||data;   // accept a raw {learned,srs} object too
      if(!p||typeof p.learned!=='object'||typeof p.srs!=='object') throw new Error('format');
      const total=Object.keys(p.learned).length;
      if(!confirm('バックアップから '+total+' 件の学習記録を読み込みます。\n現在の進捗と統合します(新しい記録が優先されます)。よろしいですか?')) return;
      const r=mergeProgress(progress,p);
      saveProgress();
      renderHome();
      showDataMsg('インポート完了:学習済 '+r.learned+' 件を追加、復習データ '+r.srs+' 件を更新しました');
    }catch(e){
      showDataMsg('読み込めませんでした。ロシア語マスターでエクスポートしたJSONファイルを選択してください。',true);
    }
  };
  reader.onerror=()=>showDataMsg('ファイルを読み込めませんでした。',true);
  reader.readAsText(file);
}
function isLearned(c,u,i){return !!progress.learned[sentKey(c,u,i)];}
function setLearned(c,u,i,v){
  const k=sentKey(c,u,i);
  if(v){
    if(!progress.srs[k]) gradeSrs(c,u,i,4);
    else { progress.learned[k]=1; bumpDaily(); saveProgress(); }
  }else{
    delete progress.learned[k];
    delete progress.srs[k];
    saveProgress();
  }
}

// STATS
function getCourseStats(k){const c=COURSES[k];let t=0,l=0;c.units.forEach(u=>{t+=u.sentences.length;u.sentences.forEach((s,i)=>{if(isLearned(k,u.id,i))l++;});});return {total:t,learned:l};}
function getUnitStats(k,uid){const u=COURSES[k].units.find(x=>x.id===uid);let l=0;u.sentences.forEach((s,i)=>{if(isLearned(k,uid,i))l++;});return {total:u.sentences.length,learned:l};}
function getGlobalStats(){let t=0,l=0;Object.keys(COURSES).forEach(k=>{const s=getCourseStats(k);t+=s.total;l+=s.learned;});return {total:t,learned:l,percent:t?Math.round(l/t*100):0};}

// SRS — SM-2 (lite). State per sentence: e(ase), i(nterval days), r(eps), d(ue ms), l(astReviewed ms).
// Quality grades used by UI: 1=Again, 4=Good, 5=Easy.
const DAY_MS=86400000;
// SRSの純粋ロジック(nextIntervalDays / nextEase)と進捗マージ(mergeProgress)は srs.js に
// 切り出してあり、Nodeで単体テストしている(srs.test.js)。srs.js はこのスクリプトより前に
// classic <script> として読み込まれ、これらをグローバルとして公開する。
function gradeSrs(c,u,i,q){
  const k=sentKey(c,u,i);
  const now=Date.now();
  const s=progress.srs[k]||{e:2.5,i:0,r:0,d:0,l:0};
  if(q<3){
    s.r=0;s.i=0;
    s.d=now+10*60*1000;          // 10-min relearn
  }else{
    s.i=nextIntervalDays(s,q);
    s.r+=1;
    s.d=now+s.i*DAY_MS;
  }
  s.e=nextEase(s.e,q); // SM-2 ease更新(srs.js、srs.test.jsで検証)
  s.l=now;
  progress.srs[k]=s;
  if(s.r>=1) progress.learned[k]=1;
  bumpDaily();
  saveProgress();
}
function isDue(c,u,i){const s=progress.srs[sentKey(c,u,i)];return !!s && s.d<=Date.now();}
function previewInterval(c,u,i,q){
  if(q<3) return '10分';
  const s=progress.srs[sentKey(c,u,i)]||{e:2.5,i:0,r:0,d:0,l:0};
  return nextIntervalDays(s,q)+'日';
}
function getUnitDueCount(c,uid){
  const u=COURSES[c].units.find(x=>x.id===uid);if(!u)return 0;
  let n=0;for(let i=0;i<u.sentences.length;i++) if(isDue(c,uid,i)) n++;return n;
}
function getCourseDueCount(c){let n=0;COURSES[c].units.forEach(u=>{u.sentences.forEach((_,i)=>{if(isDue(c,u.id,i))n++;});});return n;}
function getGlobalDueCount(){return Object.keys(COURSES).reduce((a,k)=>a+getCourseDueCount(k),0);}

// TTS - Chirp 3: HD MP3再生 + Web Speech APIフォールバック(ロシア語)
let ruVoice = null;
let audioManifest = null;
let manifestReady = false;      // 読み込みが成功/失敗どちらでも「決着」したか
let manifestPromise = null;     // 進行中の読み込みPromise(初回1回だけ生成・共有)
let currentAudio = null;
const AUDIO_BASE = './audio/';
const MANIFEST_URL = './audio-manifest.json';

function loadVoices(){if(!('speechSynthesis' in window))return false;const v=speechSynthesis.getVoices();if(v.length===0)return false;ruVoice=v.find(x=>x.lang&&x.lang.toLowerCase().startsWith('ru'))||null;return true;}
function initVoices(){if(!('speechSynthesis' in window))return;if(!loadVoices())speechSynthesis.onvoiceschanged=loadVoices;}

// マニフェスト読み込み(初回1回だけ実行してPromiseを共有する・冪等)。
// 成否に関わらず manifestReady を立て、speak() はこれを待ってから再生方法を決める
// ので、タップが速くてもMP3を取りこぼして合成音声に落ちることがない。
function loadManifest(){
  if(!manifestPromise){
    manifestPromise = fetch(MANIFEST_URL,{cache:'force-cache'})
      .then(res => res.ok ? res.json() : null)
      .catch(() => null)
      .then(json => {
        audioManifest = json;
        manifestReady = true;
        console.log(json ? 'Audio manifest loaded: '+Object.keys(json).length+' entries'
                         : 'Manifest unavailable, using Web Speech API fallback');
        return json;
      });
  }
  return manifestPromise;
}

function stopAll(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.src='';
    currentAudio=null;
  }
  if('speechSynthesis' in window) speechSynthesis.cancel();
}

function speak(text, rate, onEnd){
  stopAll();
  loadManifest();                 // 冪等: 進行中Promiseを確保(タップ起点でも確実に読み込む)
  if(!manifestReady){             // まだ決着していなければ待ってから判定(競合での取りこぼし防止)
    manifestPromise.then(() => playText(text, rate, onEnd));
    return;
  }
  playText(text, rate, onEnd);
}

function playText(text, rate, onEnd){
  // Chirp 3 HD MP3を優先使用
  if(audioManifest && audioManifest[text]){
    try{
      const audio = new Audio(AUDIO_BASE + audioManifest[text]);
      // rate: 0.5 = ゆっくり再生(復習用), 1.0 = ネイティブ速度
      audio.playbackRate = rate ? Math.max(0.5, Math.min(2, rate / 0.85)) : 1.0;
      audio.preservesPitch = true; // 音程を維持
      currentAudio = audio;
      audio.addEventListener('ended', () => {
        if(currentAudio === audio) currentAudio = null;
        if(onEnd) onEnd();
      });
      audio.addEventListener('error', () => {
        if(currentAudio === audio) currentAudio = null;
        speakFallback(text, rate, onEnd);   // MP3失敗時はWeb Speech APIへ
      });
      audio.play().catch(() => speakFallback(text, rate, onEnd)); // 自動再生ブロック等
      return;
    }catch(e){ /* 例外時もフォールバック */ }
  }
  // フォールバック: Web Speech API
  speakFallback(text, rate, onEnd);
}

function speakFallback(text, rate, onEnd){
  if(!('speechSynthesis' in window)){if(onEnd)onEnd();return;}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU';
  u.rate = rate || 0.85;
  u.pitch = 1;
  if(ruVoice) u.voice = ruVoice;
  u.onend = () => {if(onEnd) onEnd();};
  u.onerror = () => {if(onEnd) onEnd();};
  setTimeout(() => speechSynthesis.speak(u), 30);
}

// ユニットを開いたら、その文・語彙の音声を先読みしてService Workerのキャッシュに保存する。
// これで未再生でもオフラインで鳴り、初回タップも待たずに即再生できる(失敗は無視)。
function prefetchUnitAudio(u){
  if(!u) return;
  const warm = () => {
    if(!audioManifest) return;
    const seen = new Set();
    const add = (t) => {
      if(!t || seen.has(t)) return; seen.add(t);
      const file = audioManifest[t];
      if(file) fetch(AUDIO_BASE + file).catch(() => {}); // SWがcache-firstで保存。失敗は無視
    };
    u.sentences.forEach(s => { add(s.ru); (s.words||[]).forEach(w => add(w.ru)); });
  };
  if(manifestReady) warm(); else loadManifest().then(warm);
}

function showVoiceNotice(el){
  // Chirp 3 HD音声があれば通知不要
  if(audioManifest){el.innerHTML='';return;}
  if(!('speechSynthesis' in window)){
    el.innerHTML='<div class="notice">この端末は音声に対応していません。テキスト学習のみご利用いただけます。</div>';
    return;
  }
  setTimeout(()=>{
    if(audioManifest){el.innerHTML='';return;}
    if(!ruVoice){
      el.innerHTML='<div class="notice">高品質音声(Chirp 3 HD)を読み込み中...または、お使いの端末にロシア語音声がない場合はテキストのみで学習できます。</div>';
    }else{
      el.innerHTML='';
    }
  },800);
}

// GLOBAL REVIEW — all due cards across every course/unit, oldest due first
function getAllDueItems(){
  const items=[];
  Object.keys(COURSES).forEach(c=>{
    COURSES[c].units.forEach(u=>{
      u.sentences.forEach((s,i)=>{
        if(isDue(c,u.id,i)) items.push({s, c, u:u.id, i, unitTitle:u.title, due:progress.srs[sentKey(c,u.id,i)].d});

    });

  items.sort((a,b)=>a.due-b.due);

function buildVocabHtml(s, sentIdx){
  if(!s.words || s.words.length===0) return {toggle:'', list:''};
  const items = s.words.map((w,wi)=>(
    `<div class="vocab-item"><button type="button" class="vocab-ru" data-sidx="${sentIdx}" data-widx="${wi}" lang="ru">${escapeHtml(w.ru)}</button><div class="vocab-ph">${escapeHtml(w.ph)}</div><div class="vocab-jp">${escapeHtml(w.jp)}</div></div>`
  )).join('');
  return {
    toggle: `<button class="vocab-toggle" data-idx="${sentIdx}"><span>新出語 ${s.words.length} 語 (vocabulary)</span><span class="arrow">▶</span></button>`,
    list:   `<div class="vocab-list" id="vocab-${sentIdx}">${items}</div>`
  };
}

  const u=currentUnit();
  const stats=getUnitStats(state.course,state.unit);
  $('study-counter').textContent=stats.learned+' / '+stats.total;
  $('study-meta').textContent=u.ruTitle;
  const w=$('sentence-list');w.innerHTML='';
  if(u.note){
    const n=document.createElement('div');
    n.className='notice';n.style.margin='0 0 14px';
    n.textContent=u.note;
    w.appendChild(n);
  }
  u.sentences.forEach((s,i)=>{
    const learned=isLearned(state.course,state.unit,i);
    const {toggle, list}=buildVocabHtml(s,i);
    const togglePart = toggle ? `<div style="flex:1">${toggle}</div>` : '';
    const card=document.createElement('div');card.className='sentence-card';
    card.innerHTML=
      `<div class="num">№ ${String(i+1).padStart(3,'0')}</div>`+
      `<button type="button" class="sent-ru" data-idx="${i}" lang="ru">${escapeHtml(s.ru)}${ICONS.speaker}</button>`+
      `<div class="sent-ph">${escapeHtml(s.ph)}</div>`+
      `<div class="sent-jp">${escapeHtml(s.jp)}</div>`+
      `<div class="sent-actions">`+
        `<button class="icon-btn slow" data-action="slow" data-idx="${i}" aria-label="ゆっくり再生">${ICONS.clock}</button>`+
        `<button class="icon-btn learned ${learned?'active':''}" data-action="learned" data-idx="${i}" aria-label="学習済みを切替">${ICONS.check}</button>`+
        togglePart+
      `</div>`+
      list;
    w.appendChild(card);
  });

  $$('.sent-ru',w).forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.idx;
      clearPlaying(w);
      playWithHighlight(el, u.sentences[i].ru, 0.8);
    });
  });
  $$('.icon-btn',w).forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const i=+btn.dataset.idx;const a=btn.dataset.action;
      if(a==='slow'){
        clearPlaying(w);
        const t=btn.closest('.sentence-card').querySelector('.sent-ru');
        playWithHighlight(t, u.sentences[i].ru, 0.5);
      }else if(a==='learned'){
        const v=!isLearned(state.course,state.unit,i);
        setLearned(state.course,state.unit,i,v);
        btn.classList.toggle('active',v);
        const s2=getUnitStats(state.course,state.unit);
        $('study-counter').textContent=s2.learned+' / '+s2.total;
      }
    });
  });
  $$('.vocab-toggle',w).forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const i=+btn.dataset.idx;
      btn.classList.toggle('active');
      $('vocab-'+i).classList.toggle('show');
    });
  });
  $$('.vocab-ru',w).forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const sidx=+el.dataset.sidx, widx=+el.dataset.widx;
      const word=u.sentences[sidx].words[widx];
      clearPlaying(w);
      playWithHighlight(el, word.ru, 0.7);
    });
  });

  }else{

        : `<div class="quiz-menu-btn disabled"><div class="qm-head"><span class="qm-title">語彙クイズ</span><span class="qm-ru">Словарь</span></div><div class="qm-desc">この課は新出語が少ないため出題できません</div></div>`)+
    `</div>`;
  $$('.quiz-menu-btn[data-type]').forEach(b=>b.addEventListener('click',()=>beginQuiz(b.dataset.type)));
}
function beginQuiz(type){
  const u=currentUnit();
  const pool = type==='vocab'
    ? getUnitWords(u).map((s,idx)=>({s,idx}))       // 語彙: {ru,ph,jp} は文と同形
    : u.sentences.map((s,idx)=>({s,idx}));
  const qs=shuffle(pool).slice(0,Math.min(10,pool.length));
  state.quiz={type,questions:qs,pool,current:0,correct:0,answers:[],answered:false,direction:'ru2jp'};
  renderQuizQ();
}
function renderQuizQ(){
  const q=state.quiz;
  if(q.current>=q.questions.length){renderQuizResult();return;}
  $('study-counter').textContent=(q.current+1)+' / '+q.questions.length;
  const cur=q.questions[q.current];const sent=cur.s;
  q.direction = q.type==='listening' ? 'listen' : (Math.random()<0.5?'ru2jp':'jp2ru');
  const distract=shuffle(q.pool.filter(x=>x.idx!==cur.idx)).slice(0,3);
  const opts=shuffle([cur,...distract]);

  // Progress pips
  let pips='<div class="quiz-progress">';
  for(let i=0;i<q.questions.length;i++){
    let cls='';
    if(i<q.current) cls=q.answers[i]==='correct'?'done':'wrong';
    else if(i===q.current) cls='current';
    pips+=`<div class="pip ${cls}"></div>`;
  }
  pips+='</div>';

  // Question card
  const vocab = q.type==='vocab' ? '単語:' : '';
  let qh;
  if(q.direction==='listen'){
    qh=`<div class="quiz-question"><div class="quiz-prompt">聴き取り → 日本語</div>`+
       `<button type="button" class="listen-btn" id="listen-btn" aria-label="ロシア語の音声を再生">${ICONS.speaker}</button>`+
       `<div class="listen-hint">タップでもう一度聞く</div>`+
       `<div class="listen-reveal" id="listen-reveal" hidden><div class="rv-ru" lang="ru">${escapeHtml(sent.ru)}</div><div class="quiz-ph-small">${escapeHtml(sent.ph)}</div></div></div>`;
  }else if(q.direction==='ru2jp'){
    qh=`<div class="quiz-question"><div class="quiz-prompt">${vocab}ロシア語 → 日本語</div><button type="button" class="quiz-ru" id="quiz-ru" lang="ru">${escapeHtml(sent.ru)}</button><div class="quiz-ph-small">${escapeHtml(sent.ph)}</div></div>`;
  }else{
    qh=`<div class="quiz-question"><div class="quiz-prompt">${vocab}日本語 → ロシア語</div><div class="quiz-jp">${escapeHtml(sent.jp)}</div></div>`;
  }

  // Options — 聴き取りは露→日と同じく日本語の選択肢
  const optsHtml = opts.map(o=>{
    const correct = o.idx===cur.idx ? '1' : '0';
    return q.direction==='jp2ru'
      ? `<button class="quiz-option" data-correct="${correct}"><div class="opt-ru">${escapeHtml(o.s.ru)}</div><div class="opt-ph">${escapeHtml(o.s.ph)}</div></button>`
      : `<button class="quiz-option" data-correct="${correct}"><div class="opt-jp">${escapeHtml(o.s.jp)}</div></button>`;
  }).join('');
  const oh = `<div class="quiz-options">${optsHtml}</div><button class="quiz-next-btn" id="quiz-next-btn">次の問題へ</button>`;

  $('quiz-area').innerHTML = pips+qh+oh;

  if(q.direction==='ru2jp'){
    const t=$('quiz-ru');
    t.addEventListener('click',()=>playWithHighlight(t, sent.ru, 0.75));
    setTimeout(()=>playWithHighlight(t, sent.ru, 0.8), 200);
  }else if(q.direction==='listen'){
    const t=$('listen-btn');
    t.addEventListener('click',()=>playWithHighlight(t, sent.ru, 0.8));
    setTimeout(()=>playWithHighlight(t, sent.ru, 0.8), 250);
  }
  q.answered=false;
  $$('.quiz-option').forEach(opt=>{
    opt.addEventListener('click',()=>{
      if(q.answered) return; q.answered=true;
      const correct = opt.dataset.correct==='1';
      $$('.quiz-option').forEach(o=>{o.classList.add('disabled'); if(o.dataset.correct==='1') o.classList.add('correct');});
      if(!correct) opt.classList.add('wrong');
      if(q.direction==='jp2ru') speak(sent.ru, 0.75);
      if(q.direction==='listen') $('listen-reveal').hidden=false;   // 答え合わせ後にテキストを表示
      if(correct){ q.correct++; q.answers.push('correct'); } else { q.answers.push('wrong'); }
      if(q.type==='vocab'){ bumpDaily(); saveProgress(); }          // 語彙は文のSRS対象外・日別カウントのみ
      else gradeSrs(state.course,state.unit,cur.idx,correct?4:1);
      $('quiz-next-btn').classList.add('show');
    });
  });
  $('quiz-next-btn').addEventListener('click',()=>{state.quiz.current++;renderQuizQ();});
}
function renderQuizResult(){
  const q=state.quiz;const t=q.questions.length;const c=q.correct;const p=Math.round(c/t*100);
  let title,ru,m;
  if     (p===100){title='完璧です';     ru='Превосходно!'; m='✶';}
  else if(p>=80) {title='すばらしい';   ru='Отлично!';     m='✦';}
  else if(p>=60) {title='よくできました'; ru='Хорошо!';       m='✦';}
  else if(p>=40) {title='もう一歩';      ru='Попробуйте ещё раз!';  m='✦';}
  else           {title='練習しましょう'; ru='Продолжайте заниматься!'; m='✦';}
  $('quiz-area').innerHTML=
    `<div class="quiz-result">`+
      `<div class="quiz-result-emoji">${m}</div>`+
      `<div class="quiz-result-title">${title}</div>`+
      `<div class="quiz-result-ru">${ru}</div>`+
      `<div class="quiz-result-score">${c} / ${t}</div>`+
      `<div class="quiz-result-detail">正答率 ${p}%</div>`+
      `<div class="quiz-result-actions">`+
        `<button class="retry" id="quiz-retry">もう一度</button>`+
        `<button class="next" id="quiz-back">レッスンへ戻る</button>`+
      `</div>`+
      `<button class="quiz-menu-link" id="quiz-menu-link">別の形式のクイズを選ぶ</button></div>`;
  $('quiz-retry').addEventListener('click',()=>beginQuiz(q.type));
  $('quiz-menu-link').addEventListener('click',()=>renderQuizMenu());
  $('quiz-back').addEventListener('click',()=>document.querySelector('.mode-tab[data-mode="list"]').click());
  const s2=getUnitStats(state.course,state.unit);
  $('study-counter').textContent=s2.learned+' / '+s2.total;
}

// EVENTS
$$('.back-btn').forEach(b=>b.addEventListener('click',()=>{
  const t=b.dataset.back;
  if(t==='home'){renderHome();showScreen('home');}
  else if(t==='units'){
    // Global review is entered from home, so back returns there.
    if(state.globalQueue||!state.course){endGlobalReview();renderHome();showScreen('home');}
    else openCourse(state.course);
  }
}));
$$('.mode-tab').forEach(t=>t.addEventListener('click',()=>{
  $$('.mode-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');showMode(t.dataset.mode);
}));
$('flashcard').addEventListener('click',(e)=>{
  const ruBtn=e.target.closest('#fc-ru');
  if(ruBtn){
    // Use the current deck item — in review mode state.cardIdx indexes the queue, not u.sentences.
    const item=currentItem();
    if(!item) return;
    playWithHighlight(ruBtn, item.s.ru, 0.75);
    return;
  }
  flipCard();
});
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopAll();});
$('export-btn').addEventListener('click',exportProgress);
$('import-btn').addEventListener('click',()=>$('import-file').click());
$('import-file').addEventListener('change',(e)=>{
  const f=e.target.files[0];
  if(f) importProgressFile(f);
  e.target.value='';   // allow re-selecting the same file
});

// INIT
if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{});
initVoices();
loadManifest();  // Chirp 3 HD MP3マニフェストを読み込み
loadCourses().then(renderHome).catch(err=>{
  console.error('Failed to load courses:',err);
  const list=$('course-list');
  if(list) list.innerHTML='<div class="notice">コースデータを読み込めませんでした。ページを再読み込みしてください。</div>';
});

// PWA — service worker registration + seamless auto-update
if('serviceWorker' in navigator){
  // If this page was already controlled by a service worker, a controllerchange means a
  // NEW version just activated → reload once to pick up fresh HTML/JS/manifest with no
  // manual cache clearing. Skipped on the first-ever visit (no prior controller).
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(hadController && !window.__swReloaded){ window.__swReloaded = true; window.location.reload(); }
  });
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg=>console.log('SW registered, scope:',reg.scope))
    .catch(err=>console.log('SW registration failed:',err));
}
</script>
</body>
